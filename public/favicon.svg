    <line x1="16" y1="16" x2="8" y2="8"/>
    <line x1="16" y1="16" x2="25" y2="10"/>
    <line x1="16" y1="16" x2="9" y2="24"/>
    <line x1="16" y1="16" x2="24" y2="23"/>
  </g>
  <g fill="#9A80FF">
